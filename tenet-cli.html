<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// WEBSOCKET — connection to the Tenet engine server
// ─────────────────────────────────────────────────────────────────
// When the server is running (Docker or node server.js), the CLI
// routes confirmed intents through WebSocket to the real engines.
// If the server is unreachable, the CLI falls back to standalone
// mock engines automatically. The FI never sees the difference.
// ═══════════════════════════════════════════════════════════════════
const WS_URL = localStorage.getItem('tenet-ws-url') || 'ws://localhost:8080';
let _ws       = null;
let _wsReady  = false;
let _pendingOrderCallbacks = {}; // orderId → { resolve, reject }

function wsConnect() {
  try {
    _ws = new WebSocket(WS_URL);
  } catch(e) {
    setEngineStatus('standalone');
    return;
  }

  _ws.onopen = () => {
    _wsReady = true;
    setEngineStatus('connected');
  };

  _ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    wsHandleMessage(msg);
  };

  _ws.onclose = () => {
    _wsReady = false;
    setEngineStatus('standalone');
    // Retry connection every 5 seconds quietly in background
    setTimeout(wsConnect, 5000);
  };

  _ws.onerror = () => {
    _wsReady = false;
    setEngineStatus('standalone');
  };
}

function wsSend(msg) {
  if (_wsReady && _ws && _ws.readyState === WebSocket.OPEN) {
    _ws.send(JSON.stringify(msg));
    return true;
  }
  return false;
}

let _nextAcceptedCallback = null;

function wsHandleMessage(msg) {
  switch(msg.type) {

    case 'state:full':
      if (msg.data?.registries?.fi) {
        const fi = msg.data.registries.fi[S.fi.tenetAddress];
        if (fi) {
          const vault = msg.data.vaults?.[fi.vault];
          if (vault && vault.balance !== undefined) {
            S.fi.vault.balance = vault.balance - vault.reserved;
            refreshVault();
          }
        }
      }
      break;

    case 'intent:accepted': {
      const { orderId } = msg.data;
      if (_nextAcceptedCallback) {
        _nextAcceptedCallback(orderId);
        _nextAcceptedCallback = null;
      }
      break;
    }

    case 'intent:rejected': {
      const { reason, msg:detail } = msg.data;
      _nextAcceptedCallback = null;
      bl(); ln(`  ${reason}${detail?' — '+detail:''}`, 'error'); bl();
      break;
    }

    case 'order:transition': {
      const { orderId, to, order } = msg.data;
      wsUpdateLifecycle(orderId, to, order);
      if (to === 'AWAITING_SETTLEMENT' && order) {
        S.fi.vault.balance = Math.max(0, S.fi.vault.balance - (order.total || 0));
        refreshVault();
      }
      break;
    }

    case 'vault:update': {
      const { vault } = msg.data;
      if (vault?.fi === S.fi.tenetAddress && vault.balance !== undefined) {
        S.fi.vault.balance = vault.balance - vault.reserved;
        refreshVault();
      }
      break;
    }
  }
}

// Lifecycle animator driven by server state transitions
const _liveBlocks = {}; // orderId → { blockEl, states }
const ORDER_STATES = ['LIVE','DELIVERING','AWAITING_SETTLEMENT','COMPLETED'];
const STATE_LABELS = {
  LIVE:               'vault reserved · searching for fills',
  DELIVERING:         'asset transfer in progress · settlement extracting',
  AWAITING_SETTLEMENT:'asset delivered · routing LP payout',
  COMPLETED:          'settled',
  FAILED:             'order failed',
  INSUFFICIENT:       'insufficient vault balance',
};

function wsUpdateLifecycle(orderId, newState, order) {
  const entry = _liveBlocks[orderId];
  if (!entry) return;

  const isFailed = ['FAILED','INSUFFICIENT'].includes(newState);
  const displayStates = isFailed
    ? [...ORDER_STATES.slice(0, Math.max(1, ORDER_STATES.indexOf(entry.lastState || 'LIVE') + 1)), newState]
    : ORDER_STATES;

  entry.lastState = newState;

  let h = '';
  for (const s of displayStates) {
    const past    = ORDER_STATES.indexOf(s) < ORDER_STATES.indexOf(newState) && !isFailed;
    const current = s === newState;
    const dot     = past ? '●' : current ? '◉' : '○';
    const cls     = past ? 'st-done' : current ? 'st-active' : 'st-pending';
    h += `<span class="ln ${cls}">  [${dot}] ${rp(s, 26)} <span class="cd">${past||current ? (STATE_LABELS[s]||'') : ''}</span></span>\n`;
  }
  entry.blockEl.innerHTML = h;
  $out.scrollTop = $out.scrollHeight;

  if (newState === 'COMPLETED' && order) {
    bl();
    const dw = S.fi.wallets[order.delivChain] || `${S.fi.tenetAddress.split('_')[0]}Wallet_${order.delivChain}`;
    ln(`  ✓  ${order.assetQty ? num(order.assetQty, 6) : '—'} ${order.asset}  →  ${dw}`, 'success');
    ln(`  ✓  Settlement routed to LP${order.fills&&order.fills.length>1?'s':''} · native chain guaranteed`, 'success');
    bl();
    const det = [
      ['execution_tx',  order.execTx       || '—'],
      ['settlement_tx', order.settlTx      || '—'],
      ['fee_collected', order.fee ? usd(order.fee)+' USDC' : '—'],
      ['vault_balance', usd(S.fi.vault.balance)+' USDC'],
      ['completed_at',  new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'],
    ];
    for (const [k,v] of det) ln(`  <span class="cd">${rp(k,18)}</span> <span class="cm">${v}</span>`, 'info', true);
    bl(); sep(); bl();
    delete _liveBlocks[orderId];
  }

  if (isFailed && order) {
    bl();
    ln(`  ${newState} · ${order.failReason||newState}${order.failDetail?' — '+order.failDetail:''}`, 'error');
    bl(); sep(); bl();
    delete _liveBlocks[orderId];
  }
}

function setEngineStatus(mode) {
  const dot   = document.getElementById('eng-dot');
  const label = document.getElementById('eng-label');
  if (mode === 'connected') {
    dot.style.background   = '#2EBD7A';
    dot.style.boxShadow    = '0 0 6px #2EBD7A';
    label.textContent      = 'ENGINE CONNECTED';
    label.style.color      = '';
  } else {
    dot.style.background   = '#153E60';
    dot.style.boxShadow    = 'none';
    label.textContent      = 'STANDALONE MODE';
    label.style.color      = 'var(--blue-dim)';
  }
}

// num() is defined below in UTILS section — forward reference for WS layer

// ── STATE ──────────────────────────────────────────────────────────
const S={
  fi:{
    tenetAddress:'GoldmanSachs_x800',
    identity:'Goldman Sachs Asset Management',
    vault:{id:'GoldmanSettlementVault',balance:100_000_000},
    wallets:{ETH:'GoldmanWallet_ETH',SOL:'GoldmanWallet_SOL',ARB:'GoldmanWallet_ARB',BASE:'GoldmanWallet_BASE',POLYGON:'GoldmanWallet_POLYGON'},
  },
  orders:[],counter:93847591,history:[],histIdx:-1,confirm:null,
  sched:{active:false,mode:null,step:null,date:null,time:null,onFail:null,intents:[],single:null},

// ── FI REGISTRY — all registered FIs ──────────────────────────────
const FI_PROFILES={

  },

    vault:{id:'JPMorganSettlementVault',balance:250_000_000},
    wallets:{ETH:'JPMorganWallet_ETH',SOL:'JPMorganWallet_SOL',ARB:'JPMorganWallet_ARB',BASE:'JPMorganWallet_BASE',POLYGON:'JPMorganWallet_POLYGON'},
  },

  },

    vault:{id:'FidelitySettlementVault',balance:50_000_000},
    wallets:{ETH:'FidelityWallet_ETH',SOL:'FidelityWallet_SOL',ARB:'FidelityWallet_ARB',BASE:'FidelityWallet_BASE',POLYGON:'FidelityWallet_POLYGON'},

function cmdSwitch(args){
  // Usage: switch <tenetAddress or short name>
  // e.g.  switch BlackRock  or  switch BlackRock_x320
  if(!args.length){
    bl();
    ln(`  Registered FIs:`,'dim');bl();
    Object.values(FI_PROFILES).forEach(f=>{
      const active=f.tenetAddress===S.fi.tenetAddress;
      ln(`  <span class="${active?'cg':'cd'}">${active?'●':'○'}  ${rp(f.tenetAddress,22)}  ${f.identity}</span>`,'info',true);
    });
    bl();
    ln(`  Usage: switch <name>   e.g. switch BlackRock`,'dim');
    bl();return;
  }
  const query=args[0].toLowerCase();
  const match=Object.values(FI_PROFILES).find(f=>
    f.tenetAddress.toLowerCase().includes(query)||
    f.identity.toLowerCase().includes(query)

  bl();sep();

}

// ── SPOT PRICES ────────────────────────────────────────────────────
const SPOT_BASE={ETH:3318.50,SOL:141.72,BTC:87432.00,USDC:1.00,WBTC:87180.00};
function spot(a){const b=SPOT_BASE[a.toUpperCase()]??1;return b*(1+(Math.random()*.0018-.0009));}

// ── UTILS ──────────────────────────────────────────────────────────
const usd=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const num=(n,dp=4)=>n.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp});
const rp=(s,w)=>{s=String(s);return s.length>=w?s:s+' '.repeat(w-s.length);};
const lp_=(s,w)=>{s=String(s);return s.length>=w?s:' '.repeat(w-s.length)+s;};
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const ts=()=>new Date().toISOString().replace('T',' ').slice(0,19)+' UTC';
function txHash(){const h='0123456789abcdef';let s='0x';for(let i=0;i<8;i++)s+=h[Math.floor(Math.random()*16)];s+='...';for(let i=0;i<4;i++)s+=h[Math.floor(Math.random()*16)];return s;}
function nextOrdId(){return 'ORD_'+(++S.counter);}

// ── OUTPUT ENGINE ──────────────────────────────────────────────────
const $out=document.getElementById('output');
const $vault=document.getElementById('vault-display');
function refreshVault(){$vault.textContent='VAULT  '+usd(S.fi.vault.balance)+' USDC';}
function ln(text='',cls='info',asHTML=false){
  const el=document.createElement('span');el.className='ln '+cls;
  if(asHTML)el.innerHTML=text;else el.textContent=text;
  $out.appendChild(el);$out.scrollTop=$out.scrollHeight;return el;
}
const bl=()=>ln('','blank');
const sep=()=>ln('─'.repeat(70),'sep');
const sepD=()=>ln('═'.repeat(70),'sep');
function echoCmd(cmd){bl();ln('tenet > '+cmd,'cmd');}

// ── EXECUTION ENGINE ───────────────────────────────────────────────
// amount is always USDC. assetQty is derived internally from spot price.
// slipBps: max tolerated slippage in basis points. Default 50.
function buildPlan(asset,assetQty,chain,slipBps){
  const maxSlip=slipBps/10000;
  const inv=(LP[asset.toUpperCase()]||[]).filter(l=>l.chain===chain.toUpperCase()&&l.avail>0&&(1-l.px)<=maxSlip);
  if(!inv.length){
    const anyExist=(LP[asset.toUpperCase()]||[]).filter(l=>l.chain===chain.toUpperCase()&&l.avail>0);
    if(anyExist.length)return{ok:false,reason:'SLIPPAGE_EXCEEDED',msg:`No LP within ${slipBps}bps tolerance on ${chain.toUpperCase()}. Widen tolerance or reduce size.`};
    return{ok:false,reason:'LP_LIQUIDITY_UNAVAILABLE',msg:`No LP inventory for ${asset.toUpperCase()} on ${chain.toUpperCase()}.`};
  }
  const sorted=[...inv].sort((a,b)=>a.px-b.px);
  let rem=assetQty;const fills=[];
  for(const l of sorted){
    if(rem<=0.00001)break;
    const f=Math.min(l.avail,rem);
    fills.push({lp:l.lp,chain:l.chain,amount:f,px:l.px});rem-=f;
  }
  if(rem>0.0001)return{ok:false,reason:'LP_LIQUIDITY_UNAVAILABLE',msg:`Insufficient LP depth. Max fillable: ${num(assetQty-rem,4)} ${asset.toUpperCase()}.`};
  return{ok:true,fills};
}

function calcCost(asset,fills,usdcAmount){
  const assetSpot=spot(asset);
  const assetQty=fills.reduce((s,f)=>s+f.amount,0);
  const fee=usdcAmount*0.001;
  const total=usdcAmount+fee;
  const effPrice=usdcAmount/assetQty;
  const effSlipBps=Math.round(Math.max(0,(assetSpot-effPrice)/assetSpot*10000));
  return{usdcAmount,assetQty,fee,total,assetSpot,effPrice,effSlipBps};
}

// ── QUOTE DISPLAY ──────────────────────────────────────────────────
function printQuote(intent,asset,usdcAmount,fills,cost,delivChain,slipBps){
  const wallet=S.fi.wallets[delivChain.toUpperCase()]||`UnknownWallet_${delivChain}`;
  const isSplit=fills.length>1;
  const vaultOk=S.fi.vault.balance>=cost.total;
  bl();sep();ln(`  ${intent.toUpperCase()} QUOTE`,'header');sep();bl();
  const rows=[
    ['Spend',           usd(usdcAmount)+' USDC  ←  from GoldmanSettlementVault'],
    ['Receive',         num(cost.assetQty,6)+' '+asset.toUpperCase()+'  →  '+wallet],
    ['Delivery chain',  delivChain.toUpperCase()],
    ['Spot price',      usd(cost.assetSpot)+'  /  '+asset.toUpperCase()],
    ['Effective price', usd(cost.effPrice)+'  /  '+asset.toUpperCase()],
    ['Slip tolerance',  slipBps+' bps'],
    ['Eff. slippage',   cost.effSlipBps+' bps'+(cost.effSlipBps>slipBps?'  ✗ EXCEEDED':'  ✓')],
    ['Tenet fee',       usd(cost.fee)+' USDC  (10 bps)'],
    ['Vault extraction',usd(cost.total)+' USDC  (spend + fee)'],
    ['Vault balance',   usd(S.fi.vault.balance)+' USDC  '+(vaultOk?'✓':'✗ INSUFFICIENT')],
  ];
  for(const[k,v]of rows){
    const isRcv=k==='Receive',isExt=k==='Vault extraction';
    const isInsuff=k==='Vault balance'&&!vaultOk;
    const isSlipWarn=k==='Eff. slippage'&&cost.effSlipBps>slipBps;
    const cls=isRcv||isExt?'cb':isInsuff||isSlipWarn?'cr':'cw';
    ln(`  <span class="cd">${rp(k,20)}</span>  <span class="${cls}">${v}</span>`,'info',true);
  }
  if(isSplit){
    bl();ln(`  LP SPLIT  (${fills.length} providers)`,'dim');bl();
    const tot=fills.reduce((s,f)=>s+f.amount,0);
    for(const f of fills){
      const pct=((f.amount/tot)*100).toFixed(1);
      const fs=((1-f.px)*10000).toFixed(1);
      ln(`  <span class="cm">${rp(f.lp,24)}</span>  <span class="cw">${rp(num(f.amount,4)+' '+asset.toUpperCase(),22)}</span>  <span class="cd">${rp(pct+'%',6)}  @ ${f.px}  (${fs}bps)</span>`,'info',true);
    }
  }else{
    const f=fills[0];const fs=((1-f.px)*10000).toFixed(1);
    ln(`  <span class="cd">${rp('LP assignment',20)}</span>  <span class="cw">${f.lp}</span>  <span class="cd">@ ${f.px}  (${fs}bps)</span>`,'info',true);

  bl();
  if(!vaultOk){ln(`  INSUFFICIENT_FI_FUNDS — top up ${usd(cost.total-S.fi.vault.balance)} USDC required`,'error');bl();sep();bl();return false;}
  sep();bl();return true;
}

// ── ORDER LIFECYCLE ────────────────────────────────────────────────
async function runLifecycle(order){
  const isSplit=order.fills.length>1;
  bl();sep();ln(`  ORDER ${order.id}`,'header');sep();bl();
  const block=document.createElement('div');block.className='order-block';
  $out.appendChild(block);$out.scrollTop=$out.scrollHeight;
  const STATES=['LIVE','DELIVERING','AWAITING_SETTLEMENT','COMPLETED'];
  const LABELS={
    LIVE:'validating vault · LP selection confirmed',
    DELIVERING:isSplit?'pooling assets in aggregation vault':'transfer from LP vault in progress',
    AWAITING_SETTLEMENT:'FI delivery confirmed · routing LP payout',
    COMPLETED:'settled',
  };
  const DELAYS={LIVE:950,DELIVERING:1500,AWAITING_SETTLEMENT:750};
  const render=cur=>{
    let h='';
    for(const s of STATES){
      const past=STATES.indexOf(s)<STATES.indexOf(cur),current=s===cur;
      const dot=past?'●':current?'◉':'○';
      const cls=past?'st-done':current?'st-active':'st-pending';
      h+=`<span class="ln ${cls}">  [${dot}] ${rp(s,26)} <span class="cd">${past||current?LABELS[s]:''}</span></span>\n`;
    }
    block.innerHTML=h;$out.scrollTop=$out.scrollHeight;
  };
  for(let i=0;i<STATES.length;i++){
    render(STATES[i]);order.status=STATES[i];
    if(STATES[i]==='DELIVERING'){S.fi.vault.balance-=order.cost.total;refreshVault();}
    if(i<STATES.length-1)await wait(DELAYS[STATES[i]]);
  }
  order.execTx=txHash();order.settlTx=txHash();
  bl();
  const dw=S.fi.wallets[order.delivChain]||'UnknownWallet';
  ln(`  ✓  ${num(order.cost.assetQty,6)} ${order.asset}  →  ${dw}`,'success');
  const sm=order.fills.length>1?`CCTP + internal netting  (${order.fills.length} LPs)`:`CCTP  →  ${order.fills[0].lp}`;
  ln(`  ✓  Settlement routed via ${sm}`,'success');bl();
  const det=[['execution_tx',order.execTx],['settlement_tx',order.settlTx],['fee_collected',usd(order.cost.fee)+' USDC'],['vault_balance',usd(S.fi.vault.balance)+' USDC'],['completed_at',ts()]];
  for(const[k,v]of det)ln(`  <span class="cd">${rp(k,18)}</span> <span class="cm">${v}</span>`,'info',true);
  bl();sep();bl();
}

// ── BUY ───────────────────────────────────────────────────────────
// buy <asset> <usdc_amount> <settle_asset> <delivery_chain> <settle_chain> [slip_bps]
// amount = USDC to spend. Asset quantity derived from spot price.
async function cmdBuy(args,silent=false){
  if(args.length<5){
    ln(`  Usage: buy <asset> <usdc_amount> <settle_asset> <deliv_chain> <settle_chain> [slip_bps]`,'error');
    ln(`  Example: buy ETH 500000 USDC SOL ETH`,'dim');
    ln(`  Example: buy ETH 500000 USDC SOL ETH 25    ← 25bps slippage tolerance`,'dim');
    return null;
  }
  const[asset,amtS,,delivChain,settlChain]=args;
  const slipBps=parseInt(args[5])||50;
  const usdcAmount=parseFloat(amtS);
  if(isNaN(usdcAmount)||usdcAmount<=0){ln(`  Error: invalid amount "${amtS}"`,'error');return null;}
  if(!S.fi.wallets[delivChain.toUpperCase()]){
    ln(`  Error: no registered wallet for chain "${delivChain.toUpperCase()}"`,'error');
    ln(`  Supported: ${Object.keys(S.fi.wallets).join(' · ')}`,'dim');return null;
  }
  const assetQty=usdcAmount/spot(asset);
  const plan=buildPlan(asset,assetQty,delivChain,slipBps);
  if(!plan.ok){ln(`  ${plan.reason}: ${plan.msg}`,'error');return null;}
  const cost=calcCost(asset,plan.fills,usdcAmount);
  if(silent)return{intent:'buy',asset,usdcAmount,fills:plan.fills,cost,delivChain:delivChain.toUpperCase(),settlChain:settlChain.toUpperCase(),slipBps};
  const ok=printQuote('buy',asset,usdcAmount,plan.fills,cost,delivChain,slipBps);
  if(!ok)return null;
  return{intent:'buy',asset,usdcAmount,fills:plan.fills,cost,delivChain:delivChain.toUpperCase(),settlChain:settlChain.toUpperCase(),slipBps};
}

// ── SWAP ──────────────────────────────────────────────────────────
// swap <asset> <usdc_amount> <dest_asset> <source_chain> <delivery_chain> [slip_bps]
// amount = USDC notional of the source asset being exchanged.
async function cmdSwap(args){
  if(args.length<5){
    ln(`  Usage: swap <asset> <usdc_amount> <dest_asset> <src_chain> <deliv_chain> [slip_bps]`,'error');
    ln(`  Example: swap ETH 500000 SOL ETH SOL`,'dim');return null;
  }
  const[asset,amtS,destAsset,srcChain,delivChain]=args;
  const slipBps=parseInt(args[5])||50;
  const usdcAmount=parseFloat(amtS);
  if(isNaN(usdcAmount)||usdcAmount<=0){ln(`  Error: invalid amount`,'error');return null;}
  const srcSpot=spot(asset),dstSpot=spot(destAsset);
  const srcQty=usdcAmount/srcSpot;
  const destAmt=(usdcAmount/dstSpot)*(1-slipBps/10000);
  const fee=usdcAmount*0.001;
  bl();sep();ln(`  SWAP QUOTE`,'header');sep();bl();
  const rows=[
    ['Sell',           num(srcQty,6)+' '+asset.toUpperCase()+'  (≈ '+usd(usdcAmount)+' USDC)'],
    ['Receive',        num(destAmt,6)+' '+destAsset.toUpperCase()+'  on '+delivChain.toUpperCase()],
    ['Rate',           `1 ${asset.toUpperCase()} = ${num(srcSpot/dstSpot,6)} ${destAsset.toUpperCase()}`],
    ['Slip tolerance', slipBps+' bps'],
    ['Tenet fee',      usd(fee)+' USDC  (10 bps of notional)'],
    ['Route',          `${srcChain.toUpperCase()} → Tenet → ${delivChain.toUpperCase()}`],
    ['Settlement',     'CCTP  (USDC leg)  ·  Everclear  (non-USDC leg)'],
  ];
  for(const[k,v]of rows)ln(`  <span class="cd">${rp(k,20)}</span>  <span class="${k==='Receive'?'cb':'cw'}">${v}</span>`,'info',true);
  bl();sep();bl();
  return{
    intent:'swap',asset,usdcAmount,destAsset,srcChain:srcChain.toUpperCase(),
    fills:[{lp:`Wintermute_${delivChain.toUpperCase()}`,chain:delivChain.toUpperCase(),amount:destAmt,px:1-slipBps/10000}],
    cost:{usdcAmount,assetQty:srcQty,fee,total:usdcAmount+fee,assetSpot:srcSpot,effPrice:srcSpot,effSlipBps:slipBps},
    delivChain:delivChain.toUpperCase(),settlChain:srcChain.toUpperCase(),slipBps,
  };
}

async function handleScheduleInput(raw){
  const sm=S.sched,inp=raw.trim();
  if(inp.toLowerCase()==='cancel'){Object.assign(sm,{active:false,step:null});setPromptLabel('tenet >');bl();ln(`  Schedule cancelled.`,'warn');bl();return;}
  if(sm.mode==='single'){
    if(sm.step==='single_date'){
      if(!/^\d{4}-\d{2}-\d{2}$/.test(inp)){ln(`  Invalid format. Use YYYY-MM-DD.`,'error');ln(`  → Date  (YYYY-MM-DD) :`,'bright');return;}
      sm.date=inp;sm.step='single_time';bl();ln(`  → Time  (HH:MM UTC) :`,'bright');bl();setPromptLabel('  → time :');return;
    }
    if(sm.step==='single_time'){
      if(!/^\d{2}:\d{2}$/.test(inp)){ln(`  Invalid format. Use HH:MM.`,'error');ln(`  → Time  (HH:MM UTC) :`,'bright');return;}
      sm.time=inp;Object.assign(sm,{active:false,step:null});setPromptLabel('tenet >');
      const sid='SCHED_'+Date.now();
      bl();sep();ln(`  INTENT SCHEDULED`,'header');sep();bl();
      ln(`  <span class="cd">Schedule ID</span>  ${sid}`,'info',true);
      ln(`  <span class="cd">Execute at </span>  ${sm.date} ${sm.time} UTC`,'info',true);
      ln(`  <span class="cd">Intent     </span>  <span class="cw">${sm.single.type} ${sm.single.args.join(' ')}</span>`,'info',true);
      ln(`  <span class="cd">Status     </span>  <span class="cg">SCHEDULED</span>`,'info',true);bl();
      const execDT=new Date(`${sm.date}T${sm.time}:00Z`),msLeft=execDT-Date.now();
      const snap=Object.assign({},sm.single);
      if(msLeft<=5000){ln(`  Executing immediately.`,'warn');bl();await dispatchIntent(snap.type,snap.args,true);}
      else{ln(`  Executes in ${Math.ceil(msLeft/1000)}s.`,'dim');bl();sep();bl();setTimeout(async()=>{bl();ln(`  SCHEDULED INTENT EXECUTING  ${sid}`,'bright');bl();await dispatchIntent(snap.type,snap.args,true);},msLeft);}
      return;
    }
  }
  if(sm.mode==='batch'){
    if(sm.step==='date'){
      if(!/^\d{4}-\d{2}-\d{2}$/.test(inp)){ln(`  Invalid format. Use YYYY-MM-DD.`,'error');ln(`  → Date  (YYYY-MM-DD) :`,'bright');return;}
      sm.date=inp;sm.step='time';bl();ln(`  → Time  (HH:MM UTC) :`,'bright');bl();setPromptLabel('  → time :');return;
    }
    if(sm.step==='time'){
      if(!/^\d{2}:\d{2}$/.test(inp)){ln(`  Invalid format. Use HH:MM.`,'error');ln(`  → Time  (HH:MM UTC) :`,'bright');return;}
      sm.time=inp;sm.step='failure';bl();ln(`  → On failure  [continue / halt] :`,'bright');bl();setPromptLabel('  → on-failure :');return;
    }
    if(sm.step==='failure'){
      const v=inp.toLowerCase();
      if(!['continue','halt','c','h'].includes(v)){ln(`  Enter 'continue' or 'halt'.`,'error');return;}
      sm.onFail=v.startsWith('c')?'continue':'halt';sm.step='intents';
      bl();ln(`  ✓  ${sm.date} ${sm.time} UTC  ·  on failure: ${sm.onFail}`,'success');
      bl();ln(`  Enter intents (buy · sell · swap · convert). Type 'done' when complete.`,'dim');
      bl();ln(`  → Intent 1 :`,'bright');bl();setPromptLabel(`  → intent 1 :`);return;
    }
    if(sm.step==='intents'){
      if(inp.toLowerCase()==='done'){if(!sm.intents.length){ln(`  Add at least one intent, or type 'cancel'.`,'error');return;}await commitBatch();return;}
      const parts=inp.split(/\s+/),iType=parts[0].toLowerCase();
      if(!['buy','sell','swap','convert'].includes(iType)){ln(`  Unknown intent "${iType}".`,'error');return;}
      sm.intents.push({raw:inp,type:iType,args:parts.slice(1)});
      bl();ln(`  ✓  Intent ${sm.intents.length} queued: <span class="cw">${inp}</span>`,'success',true);
      bl();ln(`  → Intent ${sm.intents.length+1}  (or 'done' to commit) :`,'bright');bl();
      setPromptLabel(`  → intent ${sm.intents.length+1} :`);return;
    }
  }
}

async function commitBatch(){
  const sm=S.sched;
  const snap={date:sm.date,time:sm.time,onFail:sm.onFail,intents:[...sm.intents]};
  Object.assign(sm,{active:false,step:null,intents:[]});setPromptLabel('tenet >');
  const bid='BATCH_'+Date.now();
  bl();sep();ln(`  BATCH SCHEDULED`,'header');sep();bl();
  ln(`  <span class="cd">Batch ID    </span>  ${bid}`,'info',true);
  ln(`  <span class="cd">Execute at  </span>  ${snap.date} ${snap.time} UTC`,'info',true);
  ln(`  <span class="cd">On failure  </span>  ${snap.onFail}`,'info',true);
  ln(`  <span class="cd">Intents     </span>  ${snap.intents.length}`,'info',true);
  bl();snap.intents.forEach((i,n)=>ln(`  <span class="cd">${lp_(n+1,2)}.</span>  <span class="cw">${i.raw}</span>`,'info',true));
  bl();ln(`  <span class="cg">Status: SCHEDULED</span>`,'info',true);bl();
  const execDT=new Date(`${snap.date}T${snap.time}:00Z`),msLeft=execDT-Date.now();
  if(msLeft<=5000){ln(`  Executing batch immediately.`,'warn');bl();await runBatch(snap,bid);}
  else{ln(`  Batch executes in ${Math.ceil(msLeft/1000)}s.`,'dim');bl();sep();bl();setTimeout(()=>runBatch(snap,bid),msLeft);}
}

async function runBatch(snap,bid){
  bl();sepD();ln(`  BATCH EXECUTING  ${bid}`,'header');sepD();bl();
  for(let i=0;i<snap.intents.length;i++){
    const intent=snap.intents[i];
    ln(`  [${i+1}/${snap.intents.length}]  <span class="cb">${intent.raw}</span>`,'info',true);
    try{await dispatchIntent(intent.type,intent.args,true);}
    catch(e){ln(`  ERROR on intent ${i+1}: ${e.message}`,'error');if(snap.onFail==='halt'){ln(`  Batch halted.`,'error');return;}}
    await wait(200);
  }
  bl();ln(`  ✓  Batch complete  ·  ${snap.intents.length} intents processed`,'success');bl();sepD();bl();
}

async function dispatchIntent(type,args,autoConfirm=false){
  let data=null;
  switch(type){
    case 'buy':    data=await cmdBuy(args,autoConfirm);break;
    case 'sell':   data=await cmdSell(args,autoConfirm);break;
    case 'swap':   data=await cmdSwap(args);break;
    case 'convert':data=await cmdConvert(args);break;
    default:ln(`  Unknown intent type "${type}"`,'error');return;
  }
  if(!data)return;
  if(autoConfirm){await executeIntent(data);return;}
  S.confirm={label:type,fn:async()=>executeIntent(data)};
  ln(`  Confirm execution?  <span class="cd">[y / n]</span>`,'bright',true);bl();setPromptLabel('  confirm >');
}

async function executeIntent(data){
  // ── CONVERT — always handled locally (Circle integration) ─────
  if(data.intent==='convert'){
    bl();ln(`  Submitting Circle instruction<span class="ldots"></span>`,'info',true);
    await wait(700);ln(`  Circle instruction submitted.  Awaiting USDC mint.`,'dim');
    await wait(1400);ln(`  USDC minted on ETH mainnet.  Routing to vault.`,'dim');
    await wait(600);S.fi.vault.balance+=data.netUsdc;refreshVault();
    bl();ln(`  ✓  ${usd(data.netUsdc)} USDC  →  GoldmanSettlementVault`,'success');bl();
    ln(`  <span class="cd">conversion_ref</span>  ${txHash()}`,'info',true);
    ln(`  <span class="cd">vault_balance </span>  ${usd(S.fi.vault.balance)} USDC`,'info',true);
    bl();sep();bl();return;
  }

  // ── SERVER MODE — route intent through WebSocket to real engines ─
  if(_wsReady){
    const orderId = nextOrdId();
    const intent  = {
      tenetAddress: S.fi.tenetAddress,
      asset:        data.asset,
      usdcAmount:   data.usdcAmount,
      delivChain:   data.delivChain,
      settlChain:   data.settlChain || 'ETH',
      settlAsset:   'USDC',
      slipBps:      data.slipBps || 50,
      intent:       data.intent,
    };

    // Draw the lifecycle block — server will drive its states
    bl(); sep(); ln(`  ORDER ${orderId}  ·  ENGINE`, 'header'); sep(); bl();
    const blockEl = document.createElement('div');
    blockEl.className = 'order-block';
    $out.appendChild(blockEl);
    $out.scrollTop = $out.scrollHeight;

    // Render initial PENDING state
    let h = '';
    for(const s of ORDER_STATES){
      h+=`<span class="ln st-pending">  [○] ${rp(s,26)} </span>\n`;
    }
    blockEl.innerHTML = h;

    // Register this order for server-driven updates
    _liveBlocks[orderId] = { blockEl, lastState:'PENDING' };
    S.orders.push({ id:orderId, status:'PENDING', intent:data.intent, asset:data.asset, usdcAmount:data.usdcAmount });

    // Send to server — server will broadcast transitions back
    // We pass orderId hint so server can match responses; server generates its own ID
    // The first order:transition broadcast for this FI's new order updates the block
    wsSend({ type:'intent:submit', data:{ ...intent, _clientOrderId:orderId } });

    // Map server-assigned orderId back to our block on acceptance
    // Server responds with intent:accepted { orderId } — we remap the block
    const acceptTimeout = setTimeout(()=>{
      if(_liveBlocks[orderId]){
        ln(`  Engine timeout — no response from server`, 'error');
        delete _liveBlocks[orderId];
      }
    }, 30000);

    // Wait for intent:accepted to get the real server orderId
    // We listen in wsHandleMessage which resolves _pendingOrderCallbacks
    // Register callback keyed by the server's next orderId (sequential)
    // Simpler: we hook the next intent:accepted message
    _nextAcceptedCallback = (serverOrderId) => {
      clearTimeout(acceptTimeout);
      // Remap block from client orderId to server orderId
      _liveBlocks[serverOrderId] = _liveBlocks[orderId];
      delete _liveBlocks[orderId];
    };
    return;
  }

  // ── STANDALONE MODE — mock engines (server not running) ───────
  if(data.intent==='sell'){
    const order={id:nextOrdId(),status:'LIVE',intent:'sell',asset:data.asset,usdcAmount:data.usdcAmount,fills:data.fills,cost:data.cost,delivChain:data.delivChain,settlChain:data.settlChain,execTx:null,settlTx:null};
    S.orders.push(order);await runLifecycle(order);
    S.fi.vault.balance+=(data.usdcAmount-data.cost.fee);refreshVault();return;
  }
  const order={id:nextOrdId(),status:'LIVE',intent:data.intent,asset:data.asset,usdcAmount:data.usdcAmount,fills:data.fills,cost:data.cost,delivChain:data.delivChain,settlChain:data.settlChain,execTx:null,settlTx:null};
  S.orders.push(order);await runLifecycle(order);
}

// ── INPUT HANDLER ─────────────────────────────────────────────────
async function handleInput(raw){
  const inp=raw.trim();if(!inp)return;
  S.history.unshift(inp);if(S.history.length>120)S.history.pop();S.histIdx=-1;
  if(!S.sched.active&&!S.confirm)echoCmd(inp);
  else{bl();ln(`  > ${inp}`,'dim');}
  if(S.confirm){
    const c=S.confirm;S.confirm=null;setPromptLabel('tenet >');
    if(['y','yes'].includes(inp.toLowerCase()))await c.fn();
    else{bl();ln(`  Order cancelled.`,'warn');bl();}return;
  }
  if(S.sched.active){await handleScheduleInput(inp);return;}
  if(inp.includes('.schedule')){
    const cleaned=inp.replace(/\.schedule/g,'').trim();
    const parts=cleaned.split(/\s+/),type=parts[0].toLowerCase();
    if(!['buy','sell','swap','convert'].includes(type)){ln(`  Unknown intent type for .schedule: "${type}"`,'error');return;}
    enterSingleSchedule(type,parts.slice(1));return;
  }
  const parts=inp.split(/\s+/),cmd=parts[0].toLowerCase(),args=parts.slice(1);
  switch(cmd){
    case 'buy':     await dispatchIntent('buy',args);break;
    case 'sell':    await dispatchIntent('sell',args);break;
    case 'swap':    await dispatchIntent('swap',args);break;
    case 'convert': await dispatchIntent('convert',args);break;
    case 'schedule':enterBatchSchedule();break;
    case 'quote':   cmdQuote(args);break;
    case 'vault':   cmdVault();break;
    case 'orders':  cmdOrders();break;
    case 'switch':  cmdSwitch(args);break;
    case 'topup':   cmdTopup(args);break;
    case 'help':    cmdHelp();break;
    case 'clear':   $out.innerHTML='';bl();ln(`  Terminal cleared.`,'dim');bl();break;
    case 'exit':case 'quit':bl();ln(`  Session terminated.`,'dim');bl();break;
    default:bl();ln(`  Unknown command: "${cmd}".  Type 'help' for reference.`,'error');bl();
  }
}

function setPromptLabel(t){document.getElementById('prompt-lbl').textContent=t;}

// ── EVENT LISTENERS ───────────────────────────────────────────────
const $inp=document.getElementById('cmd-input');
$inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=$inp.value;$inp.value='';handleInput(v);return;}
  if(e.key==='ArrowUp'){e.preventDefault();if(S.histIdx<S.history.length-1){S.histIdx++;$inp.value=S.history[S.histIdx]||'';}return;}
  if(e.key==='ArrowDown'){e.preventDefault();if(S.histIdx>0){S.histIdx--;$inp.value=S.history[S.histIdx]||'';}else{S.histIdx=-1;$inp.value='';}return;}
  if(e.key==='Tab'){e.preventDefault();const v=$inp.value.toLowerCase();const c=['buy','sell','swap','convert','schedule','quote','vault','orders','switch','topup','help','clear'].find(c=>c.startsWith(v)&&c!==v);if(c)$inp.value=c+' ';return;}
});
document.getElementById('app').addEventListener('click',()=>$inp.focus());
